
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotação Dólar e Euro</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --accent-green: #00e676;
            --accent-blue: #2979ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Dynamic Background Animation */
        .ambient-light {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(58, 123, 213, 0.3) 0%, rgba(11, 15, 25, 0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: pulse-light 8s infinite alternate ease-in-out;
        }

        @keyframes pulse-light {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.5;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
        }

        /* Main Container layout */
        .container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 90%;
            max-width: 1400px;
            gap: 40px;
            z-index: 10;
        }

        /* Currency Cards with Glassmorphism */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 60px 40px;
            width: 45%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            animation: slide-up 1s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
            opacity: 0;
            transform: translateY(100px);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% {
                left: -100%;
            }

            20% {
                left: 200%;
            }

            100% {
                left: 200%;
            }
        }

        .card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .card:nth-child(2) {
            animation-delay: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }

        @keyframes slide-up {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .currency-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
        }

        .card:nth-child(2) .currency-icon {
            animation-delay: -2s;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .currency-title {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .currency-value {
            font-size: 5rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin: 0;
        }

        .currency-symbol {
            font-size: 2.5rem;
            vertical-align: super;
            margin-right: 5px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Sponsorship Area */
        .sponsorship {
            position: absolute;
            bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            animation: fade-in-up 1.5s ease 1s forwards;
            opacity: 0;
            transform: translateY(20px);
            z-index: 20;
        }

        @keyframes fade-in-up {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sponsorship-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sponsorship-image {
            height: 40px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
            transition: transform 0.3s ease;
        }

        .sponsorship:hover .sponsorship-image {
            transform: scale(1.1);
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }

            .card {
                width: 90%;
                padding: 40px 20px;
            }

            .currency-value {
                font-size: 4rem;
            }
        }
    </style>
</head>

<body>

    <div class="ambient-light"></div>

    <div class="container">
        <!-- Dólar Card -->
        <div class="card">
            <div class="currency-icon" style="color: var(--accent-green);">💵</div>
            <div class="currency-title">Dólar Comercial</div>
            <p class="currency-value" id="val-usd"><span class="currency-symbol">R$</span><span
                    class="value-text">0,000</span></p>
        </div>

        <!-- Euro Card -->
        <div class="card">
            <div class="currency-icon" style="color: var(--accent-blue);">💶</div>
            <div class="currency-title">Euro Comercial</div>
            <p class="currency-value" id="val-eur"><span class="currency-symbol">R$</span><span
                    class="value-text">0,000</span></p>
        </div>
    </div>

    <!-- Sponsorship Area -->
    <div class="sponsorship" id="sponsorship-container" style="display: none;">
        <span class="sponsorship-text">Oferecimento:</span>

        <script async
            src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4829490089497715"
            crossorigin="anonymous"></script>
        <!-- dooh -->
        <ins class="adsbygoogle" style="display:inline-block;width:300px;height:300px"
            data-ad-client="ca-pub-4829490089497715" data-ad-slot="8324708576"></ins>

    </div>

    <script>
        // Formatter for currency
        const formatCurrency = (value) => {
            return parseFloat(value).toLocaleString('pt-BR', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
        };

        // Fetch prices from AwesomeAPI
        const fetchPrices = async () => {
            try {
                const response = await fetch('https://economia.awesomeapi.com.br/last/USD-BRL,EUR-BRL');
                const data = await response.json();

                if (data.USDBRL) {
                    const elUsd = document.querySelector('#val-usd .value-text');
                    if (elUsd) elUsd.textContent = formatCurrency(data.USDBRL.ask);
                }

                if (data.EURBRL) {
                    const elEur = document.querySelector('#val-eur .value-text');
                    if (elEur) elEur.textContent = formatCurrency(data.EURBRL.ask);
                }
            } catch (error) {
                console.error("Erro ao buscar cotações:", error);
            }
        };

        // Load configuration from content.json
        const loadConfig = () => {
            const config = {
                "backgroundColor": "#0b0f19",
                "fontColor": "#ffffff",
                "cardBackground": "rgba(255, 255, 255, 0.05)",
                "oferecimento": "https://developers.cardano.org/img/devblog/minswap-blue.png"
            };

            if (config.backgroundColor) document.documentElement.style.setProperty('--bg-color', config.backgroundColor);
            if (config.fontColor) document.documentElement.style.setProperty('--text-color', config.fontColor);
            if (config.cardBackground) document.documentElement.style.setProperty('--card-bg', config.cardBackground);

            //  if (config.oferecimento) {
            const sContainer = document.getElementById('sponsorship-container');
            //const sImg = document.getElementById('sponsorship-img');
            //      if (sImg) sImg.src = config.oferecimento;
            if (sContainer) sContainer.style.display = 'flex';
            //  }
        };

        // Initialize
        window.onload = () => {
            loadConfig();
            fetchPrices();
            (adsbygoogle = window.adsbygoogle || []).push({});
            // Update prices every 30 seconds
            setInterval(fetchPrices, 30000);
        };
    </script>
</body>

</html>
