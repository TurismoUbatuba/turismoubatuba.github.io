<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer-when-downgrade" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cotação Dólar e Euro</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}

body {
    background: #0b0f19;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden;
}

.container {
    width: 100%;
    height: 100%;
    display: table;
}

.content {
    display: table-cell;
    vertical-align: middle;
    text-align: center;
}

.cards {
    width: 90%;
    margin: 0 auto;
    text-align: center;
}

.card {
    width: 42%;
    display: inline-block;
    vertical-align: top;
    margin: 0 2%;
    padding: 40px 20px;

    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);

    border-radius: 20px;
}

.icon {
    font-size: 80px;
    margin-bottom: 20px;
}

.title {
    font-size: 30px;
    color: #cccccc;
    text-transform: uppercase;
    margin-bottom: 20px;
}

.value {
    font-size: 72px;
    font-weight: bold;
}

.symbol {
    font-size: 40px;
    vertical-align: top;
}

.footer {
    position: absolute;
    bottom: 20px;
    left: 0;
    width: 100%;
    text-align: center;
    color: #888;
    font-size: 20px;
}

.error {
    color: #ff6666;
}

@media screen and (max-width: 900px) {

    .card {
        width: 90%;
        margin-bottom: 20px;
        display: block;
    }

    .value {
        font-size: 48px;
    }

    .title {
        font-size: 24px;
    }
}
</style>

</head>
<body>

<div class="container">
    <div class="content">

        <div class="cards">

            <div class="card">
                <div class="icon">💵</div>
                <div class="title">Dólar Comercial</div>

                <div class="value" id="usd">
                    <span class="symbol">R$</span>
                    <span class="price">0,000</span>
                </div>
            </div>

            <div class="card">
                <div class="icon">💶</div>
                <div class="title">Euro Comercial</div>

                <div class="value" id="eur">
                    <span class="symbol">R$</span>
                    <span class="price">0,000</span>
                </div>
            </div>

        </div>

    </div>
</div>

<div class="footer">
    <div class="sponsorship" id="sponsorship-container">
        <span class="sponsorship-text">Oferecimento:</span>

        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4829490089497715"
            crossorigin="anonymous"></script>
        <ins class="adsbygoogle"
            style="display:inline-block;width:728px;height:90px"
            data-ad-client="ca-pub-4829490089497715"
            data-ad-slot="8324708576"></ins>
        <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>
</div>

<script>

function formatCurrency(value) {

    value = parseFloat(value);

    if (isNaN(value)) {
        return "0,000";
    }

    return value.toLocaleString(
        "pt-BR",
        {
            minimumFractionDigits: 3,
            maximumFractionDigits: 3
        }
    );
}

function requestJSON(url, success, error) {

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function() {

        if (xhr.readyState !== 4) {
            return;
        }

        if (xhr.status === 200) {

            try {
                var data = JSON.parse(xhr.responseText);
                success(data);
            }
            catch(e) {
                if (error) error(e);
            }

        } else {

            if (error) {
                error(xhr.status);
            }

        }
    };

    xhr.open("GET", url, true);
    xhr.send();
}

function loadDollar() {

    requestJSON(
        "https://price.beerhouse.io/DOLAR.json",

        function(data) {

            var el = document.querySelector("#usd .price");

            if (el && data.price) {
                el.innerHTML = formatCurrency(data.price);
            }
        }
    );
}

function loadEuro() {

    requestJSON(
        "https://price.beerhouse.io/EURO.json",

        function(data) {

            var el = document.querySelector("#eur .price");

            if (el && data.price) {
                el.innerHTML = formatCurrency(data.price);
            }
        }
    );
}

function updatePrices() {
    loadDollar();
    loadEuro();
}

window.onload = function() {
    updatePrices();
};

</script>

</body>
</html>
