<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Previsão do Tempo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #FFFFFF;
      --text-primary: #1A1A2E;
      --text-secondary: #6B7280;
      --accent: #2563EB;
      --card-bg: #F8FAFC;
      --border: #E5E7EB;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 1080px;
      height: 1920px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 120px 80px;
      position: relative;
      overflow: hidden;
    }

    /* Header: Relógio */
    .header {
      text-align: center;
      margin-bottom: 60px;
    }

    .clock {
      font-size: 96px;
      font-weight: 300;
      letter-spacing: 6px;
      color: var(--text-primary);
      line-height: 1;
      transition: opacity 0.6s ease;
    }

    .clock.fade {
      opacity: 0;
    }

    /* Box do anunciante */
    .ad-box {
      width: 100%;
      max-width: 720px;
      height: 200px;
      border: 2px dashed var(--border);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 60px;
      background: var(--card-bg);
      transition: opacity 0.6s ease;
    }

    .ad-box.fade {
      opacity: 0;
    }

    .ad-placeholder {
      font-size: 28px;
      color: var(--text-secondary);
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Cidade */
    .city {
      font-size: 40px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 60px;
      letter-spacing: 1px;
    }

    .city::before {
      content: '';
      display: inline-block;
      width: 16px;
      height: 16px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 12px;
      vertical-align: middle;
    }

    /* Clima atual */
    .current-weather {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 80px;
      flex: 1;
      justify-content: center;
    }

    .weather-icon-main {
      width: 200px;
      height: 200px;
      color: var(--accent);
      margin-bottom: 24px;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .weather-icon-main.fade {
      opacity: 0;
      transform: scale(0.9);
    }

    .temperature {
      font-size: 160px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-primary);
      transition: opacity 0.6s ease;
    }

    .temperature .unit {
      font-size: 72px;
      font-weight: 400;
      color: var(--text-secondary);
      vertical-align: super;
    }

    .temperature.fade {
      opacity: 0;
    }

    .condition-text {
      font-size: 36px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-top: 20px;
      transition: opacity 0.6s ease;
    }

    .condition-text.fade {
      opacity: 0;
    }

    .details {
      display: flex;
      gap: 40px;
      margin-top: 40px;
      transition: opacity 0.6s ease;
    }

    .details.fade {
      opacity: 0;
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 28px;
      color: var(--text-secondary);
    }

    .detail-item svg {
      width: 28px;
      height: 28px;
      color: var(--accent);
    }

    /* Previsão 3 dias */
    .forecast {
      display: flex;
      gap: 24px;
      width: 100%;
      justify-content: center;
    }

    .forecast-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 48px;
      text-align: center;
      flex: 1;
      max-width: 280px;
      transition: opacity 0.6s ease, transform 0.3s ease, box-shadow 0.3s ease;
    }

    .forecast-card.fade {
      opacity: 0;
      transform: translateY(10px);
    }

    .forecast-card.highlighted {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .forecast-card.highlighted .day-name,
    .forecast-card.highlighted .temp-range {
      color: #FFFFFF;
    }

    .forecast-card.highlighted svg {
      color: #FFFFFF;
    }

    .day-name {
      font-size: 28px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .forecast-card svg {
      width: 64px;
      height: 64px;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .temp-range {
      font-size: 28px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .temp-range .max {
      font-weight: 700;
    }

    .temp-range .min {
      color: var(--text-secondary);
      margin-left: 8px;
    }

    .forecast-card.highlighted .temp-range .min {
      color: rgba(255, 255, 255, 0.7);
    }

    /* Footer */
    .footer {
      margin-top: auto;
      padding-top: 40px;
      font-size: 22px;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
    }

    /* Responsivo: escalar para viewports menores */
    @media (max-width: 1080px) {
      .container {
        width: 100%;
        height: auto;
        min-height: 100vh;
        padding: 6vh 4vw;
      }

      .clock {
        font-size: 8vw;
      }

      .temperature {
        font-size: 14vw;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="city" id="city">Carregando...</div>

    <section class="current-weather" id="currentWeather">
      <div class="weather-icon-main" id="weatherIconMain">
        <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </div>
      <div class="temperature" id="temperature">
        --<span class="unit">°C</span>
      </div>
      <div class="condition-text" id="conditionText">--</div>
      <div class="details" id="details">
        <div class="detail-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" />
          </svg>
          <span id="feelsLike">--</span>
        </div>
        <div class="detail-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20" />
            <path d="M2 12h20" />
            <circle cx="12" cy="12" r="10" />
            <path d="M12 6v12" />
            <path d="M6 12h12" />
          </svg>
          <span id="humidity">--</span>
        </div>
      </div>
    </section>

    <div class="ad-box" id="adBox">
      <span class="ad-placeholder">Espaço do Anunciante</span>
    </div>

    <div class="forecast" id="forecast">
      <div class="forecast-card highlighted" id="day0">
        <div class="day-name" id="day0Name">Hoje</div>
        <div id="day0Icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </div>
        <div class="temp-range"><span class="max" id="day0Max">--</span><span class="min" id="day0Min">--</span></div>
      </div>
      <div class="forecast-card" id="day1">
        <div class="day-name" id="day1Name">Amanhã</div>
        <div id="day1Icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" />
          </svg>
        </div>
        <div class="temp-range"><span class="max" id="day1Max">--</span><span class="min" id="day1Min">--</span></div>
      </div>
      <div class="forecast-card" id="day2">
        <div class="day-name" id="day2Name">--</div>
        <div id="day2Icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" />
          </svg>
        </div>
        <div class="temp-range"><span class="max" id="day2Max">--</span><span class="min" id="day2Min">--</span></div>
      </div>
    </div>

    <div class="footer" id="footer">
      Última atualização: <span id="updateTime">--:--</span>
    </div>
  </div>

  <script>
    const MOCK_DATA = {
      city: 'São Paulo, SP',
      current: {
        temp: 28,
        feelsLike: 31,
        humidity: 65,
        condition: 'Parcialmente Nublado',
        icon: 'cloud-sun'
      },
      forecast: [
        { dayOffset: 0, max: 28, min: 22, condition: 'cloud-sun' },
        { dayOffset: 1, max: 26, min: 19, condition: 'cloud-rain' },
        { dayOffset: 2, max: 31, min: 23, condition: 'sun' }
      ]
    };

    const LUCIDE_ICONS = {
      'sun': '<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>',
      'cloud-sun': '<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="M20 12h2"/><path d="m19.07 4.93-1.41 1.41"/><path d="M15.947 12.65a4 4 0 0 0-5.925-4.128"/><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>',
      'cloud-rain': '<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/><path d="M9.5 14v3"/><path d="M13.5 14v3"/><path d="M17.5 14v3"/></svg>',
      'cloud': '<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>',
      'cloud-lightning': '<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/><path d="m13 9-3 6h4l-2 4"/></svg>',
      'cloud-snow': '<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/><path d="M12 14v3"/><path d="M9.5 16.5 12 14l2.5 2.5"/><path d="M9.5 19.5 12 17l2.5 2.5"/></svg>'
    };

    const CONDITION_LABELS = {
      'sun': 'Ensolarado',
      'cloud-sun': 'Parcialmente Nublado',
      'cloud': 'Nublado',
      'cloud-rain': 'Chuvoso',
      'cloud-lightning': 'Tempestade',
      'cloud-snow': 'Neve'
    };

    function getShortDayName(offset) {
      if (offset === 0) return 'Hoje';
      if (offset === 1) return 'Amanhã';
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return d.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '');
    }

    function formatTime(date) {
      return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('updateTime').textContent = formatTime(now);
    }

    function applyFade(ids, callback) {
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.add('fade');
      });
      setTimeout(() => {
        callback();
        setTimeout(() => {
          ids.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.remove('fade');
          });
        }, 50);
      }, 400);
    }



    function renderWeather() {
      const data = MOCK_DATA;

      applyFade(
        ['clock', 'adBox', 'temperature', 'conditionText', 'details', 'day0', 'day1', 'day2', 'weatherIconMain'],
        () => {
          document.getElementById('city').textContent = data.city;
          document.getElementById('temperature').innerHTML =
            data.current.temp + '<span class="unit">°C</span>';
          document.getElementById('conditionText').textContent = data.current.condition;
          document.getElementById('feelsLike').textContent = data.current.feelsLike + '°C';
          document.getElementById('humidity').textContent = data.current.humidity + '%';

          document.getElementById('weatherIconMain').innerHTML =
            LUCIDE_ICONS[data.current.icon] || LUCIDE_ICONS['sun'];

          data.forecast.forEach((day, i) => {
            document.getElementById('day' + i + 'Name').textContent = getShortDayName(day.dayOffset);
            document.getElementById('day' + i + 'Icon').innerHTML =
              LUCIDE_ICONS[day.condition] || LUCIDE_ICONS['cloud-sun'];
            document.getElementById('day' + i + 'Max').textContent = day.max + '°';
            document.getElementById('day' + i + 'Min').textContent = '/' + day.min + '°';
          });

          updateClock();
        }
      );
    }

    renderWeather();
    setInterval(updateClock, 1000);
  </script>
</body>

</html>
