<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notícias — Conferência</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width:100%; height:100%; overflow:hidden; font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
    body { background:#000; }

    #bg-video-light,#bg-video-dark {
      position:fixed; inset:0; width:100%; height:100%;
      object-fit:cover; z-index:-1;
      transition:opacity 0.8s ease;
    }
    #bg-video-dark { opacity:0; }

    :root {
      --glass-bg:rgba(255,255,255,0.55); --glass-border:rgba(255,255,255,0.6);
      --glass-blur:8px; --text-main:#1a1a1a; --text-muted:#6b7280;
      --accent:#000; --card-radius:40px;
      --transition:all 0.4s cubic-bezier(0.22,1,0.36,1);
    }
    .dark-mode {
      --glass-bg:rgba(0,0,0,0.45); --glass-border:rgba(255,255,255,0.08);
      --text-main:#fff; --text-muted:#b0b0b0; --accent:#fff;
    }
    .dark-mode #bg-video-light { opacity:0; }
    .dark-mode #bg-video-dark { opacity:1; }

    .glass {
      background:var(--glass-bg);
      backdrop-filter:blur(var(--glass-blur)) saturate(1.8);
      -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.8);
      border-radius:var(--card-radius);
      box-shadow:0 4px 24px rgba(0,0,0,0.06),0 1px 4px rgba(0,0,0,0.04),inset 0 1px 0 rgba(255,255,255,0.5);
      position:relative;
    }
    .glass::after {
      content:''; position:absolute; inset:0; border-radius:inherit;
      pointer-events:none; filter:url(#noise-filter); opacity:0.06; mix-blend-mode:overlay;
    }

    .app-shell { width:100%; height:100%; display:flex; flex-direction:column; padding:32px 40px; gap:24px; }

    .top-nav {
      display:grid; grid-template-columns:auto auto 1fr auto auto;
      gap:16px; align-items:center;
    }
    .profile-btn {
      width:48px; height:48px; border-radius:50%;
      overflow:hidden; cursor:pointer; border:2px solid var(--glass-border);
    }
    .profile-btn img { width:100%; height:100%; object-fit:cover; }
    .back-btn {
      width:40px; height:40px; border-radius:14px;
      background:rgba(255,255,255,0.1); backdrop-filter:blur(8px);
      border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      color:var(--text-main); font-size:18px;
      transition:var(--transition);
    }
    .back-btn:hover { background:rgba(255,255,255,0.2); }
    .page-title { font-size:1.2rem; font-weight:600; color:var(--text-main); }
    .page-title span { color:var(--text-muted); font-weight:400; }
    .theme-switch { width:48px;height:26px;border-radius:999px;background:#3b82f6;position:relative;cursor:pointer; }
    .theme-switch .handle {
      width:22px;height:22px;border-radius:50%;background:#fff;
      position:absolute;top:2px;left:2px;transition:var(--transition);
      display:flex;align-items:center;justify-content:center;font-size:12px;
    }
    .dark-mode .theme-switch .handle { left:24px; }
    .btn-icon {
      width:48px;height:48px;border-radius:50%;
      background:rgba(255,255,255,0.1);backdrop-filter:blur(8px);
      border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      color:var(--text-main);font-size:18px;transition:var(--transition);
    }
    .btn-icon:hover { background:rgba(255,255,255,0.2);transform:scale(1.05); }

    /* News list */
    .news-list {
      flex:1; overflow-y:auto;
      display:flex; flex-direction:column; gap:16px;
      padding:4px;
    }
    .news-list::-webkit-scrollbar { width:6px; }
    .news-list::-webkit-scrollbar-track { background:transparent; }
    .news-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:999px; }

    .news-card {
      padding:24px 28px; border-radius:var(--card-radius);
      background:var(--glass-bg);
      backdrop-filter:blur(var(--glass-blur)) saturate(1.8);
      display:flex; gap:20px; align-items:flex-start;
      transition:var(--transition);
    }
    .news-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.08); }
    .news-card .nc-thumb {
      width:200px; height:120px; border-radius:20px;
      background-size:cover; background-position:center;
      flex-shrink:0;
    }
    .news-card .nc-body { flex:1; display:flex; flex-direction:column; gap:8px; }
    .news-card .nc-tag {
      display:inline-block; padding:3px 10px; border-radius:999px;
      font-size:0.7rem; font-weight:500; letter-spacing:0.03em;
      width:fit-content;
    }
    .news-card .nc-title { font-size:1.05rem; font-weight:600; color:var(--text-main); }
    .news-card .nc-summary { font-size:0.85rem; color:var(--text-muted); line-height:1.5; }
    .news-card .nc-footer {
      display:flex; align-items:center; justify-content:space-between;
      font-size:0.75rem; color:var(--text-muted); margin-top:4px;
    }
    .nc-footer .nc-actions { display:flex; gap:8px; }
    .nc-actions button {
      padding:6px 14px; border-radius:999px;
      border:none; cursor:pointer;
      font:500 0.75rem/1 'Inter',system-ui,sans-serif;
      transition:var(--transition);
    }
    .nc-actions .btn-edit { background:rgba(59,130,246,0.15); color:#3b82f6; }
    .nc-actions .btn-edit:hover { background:rgba(59,130,246,0.25); }
    .nc-actions .btn-del { background:rgba(255,69,69,0.15); color:#ff4545; }
    .nc-actions .btn-del:hover { background:rgba(255,69,69,0.25); }

    .empty-state {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:16px; color:var(--text-muted);
    }
    .empty-state .empty-icon { font-size:3rem; opacity:0.5; }
    .empty-state p { font-size:1rem; }

    @media (max-width:768px) {
      .app-shell { padding:16px; }
      .news-card { flex-direction:column; }
      .news-card .nc-thumb { width:100%; height:160px; }
      .top-nav { grid-template-columns:auto 1fr auto auto; }
      .top-nav .page-title { grid-column:1/-1; order:3; }
    }
  </style>
</head>
<body>
  <video id="bg-video-light" autoplay muted loop playsInline
    src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260514_103318_2aa26b55-df1a-43a6-903d-941e718c9366.mp4">
  </video>
  <video id="bg-video-dark" autoplay muted loop playsInline
    src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260514_102933_4e8f73b5-775a-4179-b2fb-472f59063dcd.mp4">
  </video>

  <div class="app-shell">
    <!-- Top nav -->
    <nav class="top-nav" data-od-id="top-nav">
      <button class="back-btn" onclick="history.back()" data-od-id="btn-back">←</button>
      <div class="profile-btn" data-od-id="profile-btn" onclick="window.location.href='login.html'">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%233b82f6' width='100' height='100'/%3E%3Ccircle fill='%23fff' cx='50' cy='38' r='22'/%3E%3Cpath fill='%23fff' d='M18 85c0-18 14-33 32-33s32 15 32 33'/%3E%3C/svg%3E" alt="Perfil" />
      </div>
      <div class="page-title" data-od-id="page-title">Notícias · <span id="channelNameHeader">Canal</span></div>
      <div class="theme-switch" id="themeSwitch" onclick="toggleTheme()">
        <div class="handle">☀</div>
      </div>
      <button class="btn-icon" onclick="window.location.href='index.html'" data-od-id="btn-home" title="Início">⌂</button>
    </nav>

    <!-- News list -->
    <div class="news-list" id="newsList" data-od-id="news-list"></div>
  </div>

  <!-- Modal de exclusão -->
  <div class="modal-overlay" id="deleteModal" data-od-id="delete-modal" style="position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;">
    <div class="modal-card glass" style="width:400px;padding:32px;display:flex;flex-direction:column;gap:20px;">
      <h2 style="font-size:1.1rem;font-weight:600;color:var(--text-main);">Excluir notícia</h2>
      <p style="font-size:0.9rem;color:var(--text-muted);">Tem certeza que deseja excluir esta notícia? Esta ação não pode ser desfeita.</p>
      <div style="display:flex;gap:12px;justify-content:flex-end;">
        <button class="btn-secondary" onclick="closeDeleteModal()" style="padding:10px 24px;border-radius:14px;border:1px solid var(--glass-border);background:var(--glass-bg);color:var(--text-main);font:500 0.9rem/1 'Inter',system-ui,sans-serif;cursor:pointer;">Cancelar</button>
        <button class="btn-danger" onclick="confirmDelete()" style="padding:10px 24px;border-radius:14px;border:none;background:#ff4545;color:#fff;font:600 0.9rem/1 'Inter',system-ui,sans-serif;cursor:pointer;">Excluir</button>
      </div>
    </div>
  </div>

  <svg style="position:absolute;width:0;height:0;" aria-hidden="true">
    <filter id="noise-filter">
      <feTurbulence baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      <feComposite operator="in" in2="SourceGraphic" />
    </filter>
  </svg>

  <script>
    function getParams() {
      const p = new URLSearchParams(location.search);
      return { channelId: p.get('channel'), channelName: p.get('name') || 'Canal' };
    }

    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      const h = document.querySelector('#themeSwitch .handle');
      h.textContent = document.body.classList.contains('dark-mode') ? '☾' : '☀';
    }

    function getRandomTag() {
      const tags = ['Novidade','Atualização','Evento','Comunicado','Anúncio','Artigo','Release','Dica'];
      const colors = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316'];
      const i = Math.floor(Math.random() * tags.length);
      return { label: tags[i], color: colors[i] };
    }

    const AVATAR_URI = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect fill='%233b82f6' width='40' height='40' rx='20'/%3E%3Ccircle fill='%23fff' cx='20' cy='16' r='9'/%3E%3Cpath fill='%23fff' d='M7 36c0-7 6-13 13-13s13 6 13 13'/%3E%3C/svg%3E";

    const THUMBNAILS = [
      'https://picsum.photos/seed/news1/400/240',
      'https://picsum.photos/seed/news2/400/240',
      'https://picsum.photos/seed/news3/400/240',
      'https://picsum.photos/seed/news4/400/240',
      'https://picsum.photos/seed/news5/400/240',
      'https://picsum.photos/seed/news6/400/240',
      'https://picsum.photos/seed/news7/400/240',
      'https://picsum.photos/seed/news8/400/240',
      'https://picsum.photos/seed/news9/400/240',
      'https://picsum.photos/seed/news10/400/240',
    ];

    let news = [
      { id:1, channelId:1, title:'Roadmap Q3 2025 — Novas funcionalidades', summary:'Confira as novidades que estão chegando no próximo trimestre, incluindo integração com IA e analytics avançado.', time:'2h atrás', tag:'Novidade' },
      { id:2, channelId:1, title:'Resultados da Sprint #47', summary:'Entregamos 12 histórias e reduzimos o débito técnico em 18%. Destaque para o módulo de notificações.', time:'5h atrás', tag:'Atualização' },
      { id:3, channelId:1, title:'Pesquisa de satisfação com o produto', summary:'Participe da nossa pesquisa e ajude a melhorar a experiência do produto. Leva menos de 3 minutos.', time:'1d atrás', tag:'Comunicado' },
      { id:4, channelId:2, title:'Novo design system — Componentes v2', summary:'O design system foi atualizado com novos componentes, tokens revisados e documentação completa.', time:'3h atrás', tag:'Atualização' },
      { id:5, channelId:2, title:'Workshop de prototipação avançada', summary:'Inscreva-se para o workshop desta sexta sobre prototipação interativa com Figma e framer-motion.', time:'6h atrás', tag:'Evento' },
      { id:6, channelId:2, title:'Revisão de layout — Dashboard geral', summary:'Precisamos de feedback sobre o novo layout do dashboard antes do deploy de sexta.', time:'2d atrás', tag:'Comunicado' },
      { id:7, channelId:3, title:'Migração para Node 22 concluída', summary:'Todos os serviços foram migrados com sucesso. Performance melhorou 34% nos testes de carga.', time:'1h atrás', tag:'Release' },
      { id:8, channelId:3, title:'Nova API de webhooks — Documentação', summary:'A nova API de webhooks está disponível em staging. Documentação completa no Notion.', time:'4h atrás', tag:'Novidade' },
      { id:9, channelId:3, title:'Post-mortem: Incidente 15/06', summary:'Relatório completo sobre o incidente de banco de dados da última terça-feira e medidas preventivas.', time:'3d atrás', tag:'Comunicado' },
      { id:10, channelId:4, title:'Campanha de Inverno — Métricas', summary:'A campanha teve 2.4M de impressões e CTR de 3.8%. Superamos a meta em 22%.', time:'2h atrás', tag:'Anúncio' },
      { id:11, channelId:4, title:'Novo conteúdo para redes sociais', summary:'Calendário editorial de julho com 24 peças aprovadas. Revisão final amanhã às 14h.', time:'1d atrás', tag:'Dica' },
      { id:12, channelId:5, title:'FAQ atualizado — Seção de pagamentos', summary:'Adicionamos 8 novas perguntas sobre faturamento e reembolso. Taxa de resolução em primeiro contato subiu 12%.', time:'1d atrás', tag:'Atualização' },
      { id:13, channelId:6, title:'Processo seletivo — Dev Frontend Pleno', summary:'Abertura de vaga para dev frontend. Prazo para candidaturas até 30/06.', time:'2d atrás', tag:'Anúncio' },
      { id:14, channelId:7, title:'Pipeline semanal — 12 leads quentes', summary:'Três propostas em negociação avançada. Previsão de fechamento para esta semana.', time:'5h atrás', tag:'Atualização' },
      { id:15, channelId:8, title:'Relatório financeiro — Maio 2025', summary:'Receita 18% acima do orçado. Despesas operacionais 6% abaixo do previsto. Margem bruta de 67%.', time:'1d atrás', tag:'Release' },
    ];

    let deletingId = null;

    function renderNews() {
      const { channelId } = getParams();
      const cid = channelId ? parseInt(channelId) : 1;
      document.getElementById('channelNameHeader').textContent = getParams().channelName;

      const filtered = news.filter(n => n.channelId === cid);
      const list = document.getElementById('newsList');

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state" data-od-id="empty-state">
          <div class="empty-icon">📭</div>
          <p>Nenhuma notícia neste canal ainda.</p>
        </div>`;
        return;
      }

      list.innerHTML = '';
      filtered.forEach(n => {
        const tag = getRandomTag();
        const thumb = THUMBNAILS[n.id % THUMBNAILS.length];
        const card = document.createElement('div');
        card.className = 'news-card';
        card.dataset.odId = 'news-' + n.id;
        card.innerHTML = `
          <div class="nc-thumb" style="background-image:url('${thumb}')"></div>
          <div class="nc-body">
            <div class="nc-tag" style="background:${tag.color}22;color:${tag.color}">${tag.label}</div>
            <div class="nc-title">${n.title}</div>
            <div class="nc-summary">${n.summary}</div>
            <div class="nc-footer">
              <span>${n.time}</span>
              <div class="nc-actions">
                <button class="btn-edit" onclick="alert('Edição de notícia em desenvolvimento')">Editar</button>
                <button class="btn-del" onclick="openDelete(${n.id})">Excluir</button>
              </div>
            </div>
          </div>
        `;
        list.appendChild(card);
      });
    }

    function openDelete(id) {
      deletingId = id;
      document.getElementById('deleteModal').style.display = 'flex';
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').style.display = 'none';
      deletingId = null;
    }

    function confirmDelete() {
      if (!deletingId) return;
      news = news.filter(n => n.id !== deletingId);
      closeDeleteModal();
      renderNews();
    }

    document.getElementById('deleteModal')?.addEventListener('click', function(e) {
      if (e.target === this) closeDeleteModal();
    });

    renderNews();
  </script>
</body>
</html>
