<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-Card USP</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: #f5f5f5;
}

.header {
    background: #0097A7;
    color: #000;
    padding: 10px 10px 10px 30px;
    font-size: 28px;
    font-weight: 500;
    font-family: 'Roboto', sans-serif;
    box-sizing: border-box;
}

.card {
    background: white;
    max-width: 500px;
    margin: 0 auto;
    text-align: center;
    padding: 20px;
}

.logo {
    width: 220px;
    margin: 10px auto;
}

.university {
    font-size: 20px;
    margin-bottom: 20px;
}

.status {
    font-size: 32px;
    margin-bottom: 20px;
}

.photo {
    width: 220px;
    height: 260px;
    object-fit: cover;
    background: #ddd;
}

.name {
    font-size: 24px;
    margin-top: 20px;
}

.number {
    font-size: 22px;
    margin: 10px 0;
}

.course {
    font-size: 18px;
    margin-bottom: 40px;
}

.qrcode {
    width: 250px;
    height: 250px;
    margin: 20px auto;
}

.expiration {
    margin-top: 30px;
    font-size: 18px;
    color: #444;
}
</style>
</head>
<body>

<div class="header">
    e-Card
</div>

<div class="card">

    <img src="usp-logo-eps.jpg" alt="USP" class="logo">

    <div class="university">
        Universidade de São Paulo
    </div>

    <div class="status">
        ALUNOCEU
    </div>

    <img src="https://media.licdn.com/dms/image/v2/D4D03AQHfo3HGS7uVSA/profile-displayphoto-shrink_400_400/profile-displayphoto-shrink_400_400/0/1704472513782?e=1783555200&v=beta&t=_kXrKrvRutBNNIZbwhtPlYBw7NHsYdDwxF_5hd2TYk4" alt="Aluno" class="photo">

    <div class="name">
        Marco Aurelio Santos
    </div>

    <div class="number">
        1721656
    </div>

    <div class="course">
        Faculdade de Arquitetura e Urbanismo
    </div>

    <img src="qrcode12719.png" alt="QR Code" class="qrcode">

    <div class="expiration">
        Código QR expira em 20/06/2026 23:59
    </div>

</div>

</body>
</html>
